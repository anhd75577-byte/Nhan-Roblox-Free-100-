<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sự Kiện Roblox 2026</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#00b4db,#0083b0);
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.1);
    padding:35px;
    border-radius:20px;
    width:85%;
    max-width:420px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
    padding:15px 28px;
    font-size:20px;
    font-weight:bold;
    border:3px solid #00ff66;
    border-radius:12px;
    background:transparent;
    color:#00ff66;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#00ff66;
    color:black;
    box-shadow:0 0 15px #00ff66;
}

#qr-box{
    display:none;
    margin:20px auto 0;
    width:200px;
    height:200px;
    border:4px solid #00ff66;
    border-radius:12px;
    overflow:hidden;
    animation:show .4s ease;
}

#qr-box img{
    width:100%;
    height:100%;
}

.msg{
    display:none;
    margin-top:15px;
    color:#00ff66;
    font-weight:bold;
}

@keyframes show{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>SỰ KIỆN ROBLOX</h1>
    <p>Chúc mừng! Bạn đủ điều kiện nhận 1000 Robux.</p>

    <button id="btn" onclick="openTrap()">
        Nhận 1000 Robux
    </button>

    <div id="qr-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    </div>

    <div class="msg" id="msg">
        Quét QR để nhận thưởng!
    </div>
</div>

<script>
function openTrap(){
    btn.style.display="none";
    document.getElementById("qr-box").style.display="block";
    document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
